name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for GitHub OIDC federation
permissions:
  id-token: write
  contents: read

# Never run two production deploys at once
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "20"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Verify build output
        run: test -f out/index.html || (echo "out/ not produced - is output:'export' set?" && exit 1)

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Hashed, immutable assets: cache for a year
      - name: Sync static assets
        run: |
          aws s3 sync ./out "s3://${{ vars.S3_BUCKET }}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*.html"

      # HTML must always revalidate so new deploys are seen immediately
      - name: Sync HTML
        run: |
          aws s3 sync ./out "s3://${{ vars.S3_BUCKET }}" \
            --cache-control "public,max-age=0,must-revalidate" \
            --exclude "*" --include "*.html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
